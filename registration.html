<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointment Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Register for an Appointment</h1>
        <form id="registrationForm">
            <table>
                <tr>
                    <td><label for="name">Full Name:</label></td>
                    <td><input type="text" id="name" name="name" required></td>
                </tr>
                <tr>
                    <td><label for="age">Age:</label></td>
                    <td><input type="number" id="age" name="age" required></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
                <tr>
                    <td><label for="phone">Phone Number:</label></td>
                    <td><input type="text" id="phone" name="phone" required></td>
                </tr>
                <tr>
                    <td><label for="category">Select Category:</label></td>
                    <td>
                        <select id="category" name="category" required>
                            <option value="general">General Practitioner</option>
                            <option value="pediatric">Pediatrician</option>
                            <option value="cardiologist">Cardiologist</option>
                            <option value="neurologist">Neurologist</option>
                            <option value="nephrologist">Nephrologist</option>
                            <option value="dermatologist">Dermatologist</option>
                            <option value="gastroenterologist">Gastroenterologist</option>
                            <option value="geriatrician">Geriatrician</option>
                            <option value="hematologist">Hematologist</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="time">Preferred Appointment Time:</label></td>
                    <td>
                        <select id="time" name="time" required>
                            <option value="8:00 AM">8:00 AM</option>
                            <option value="9:00 AM">9:00 AM</option>
                            <option value="10:30 AM">10:30 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="2:00 PM">2:00 PM</option>
                            <option value="4:00 PM">4:00 PM</option>
                            <option value="6:00 PM">6:00 PM</option>
                            <option value="7:00 PM">7:00 PM</option>
                            <option value="8:00 PM">8:00 PM</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="password">Password:</label></td>
                    <td>
                        <input type="password" id="password" name="password" 
                            pattern="(?=.*[A-Z])(?=.*[!@#$%^&*])(?=.*[0-9]).{8,}" 
                            title="Password must be at least 8 characters long, include one uppercase letter, one special character, and at least one number." 
                            required>
                    </td>
                </tr>
                <tr>
                    <td><label for="confirmPassword">Confirm Password:</label></td>
                    <td>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </td>
                </tr>
                <tr>
                    <td style="text-align: center;" colspan="2">
                        <!-- Replace the register button with a link to the sign-in page -->
                        <a href="signin.html" style="display: block; text-align: center; width: 100%; padding: 10px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 5px;">Sign In Here</a>
                    </td>
                </tr>
            </table>
        </form>
        <p>Already have an account? <a href="signin.html">Sign in here</a></p>
    </div>
    
    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Check if passwords match
            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            // Process the registration
            alert('Registration process complete, kindly sign in.');
            
            // Optionally, you could redirect the user to the sign-in page after registration
            // window.location.href = 'signin.html';
        });
    </script>
</body>
</html>
